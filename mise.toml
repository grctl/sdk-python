[tools]
uv = "latest"

[tasks.lint]
description = "Run ruff check"
run = "uv run ruff check --fix"

[tasks.format]
description = "Run ruff format"
run = "uv run ruff format"

[tasks.typecheck]
description = "Run type checking"
run = "uvx ty check"

[tasks.check]
description = "Run all checks"
depends = ["lint", "format", "typecheck"]

[tasks."test:unit"]
description = "Run unit tests"
run = "uv run pytest tests/unit"

[tasks."test:e2e"]
description = "Run e2e tests"
run = "uv run pytest tests/e2e tests/examples"

[tasks."test:spec"]
description = "Run spec tests"
run = "uv run pytest tests/spec"

[tasks.test]
description = "Run all tests"
depends = ["test:unit", "test:spec"]
