name: Nightly

on:
  schedule:
    - cron: "0 4 * * *" # Every night at 04:00 UTC (after grctl server nightly at 02:00)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-tests:
    name: E2E Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install tools with mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: uv sync

      - name: Download nightly grctld binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download nightly \
            --repo grctl/grctl \
            --pattern "grctl-linux-amd64.tar.gz" \
            --dir /tmp/grctld-nightly
          tar -xzf /tmp/grctld-nightly/grctl-linux-amd64.tar.gz -C /tmp/grctld-nightly grctld
          chmod +x /tmp/grctld-nightly/grctld
          echo "/tmp/grctld-nightly" >> $GITHUB_PATH

      - name: Start grctl Server
        run: |
          grctld --in-memory -l debug > /tmp/grctld.log 2>&1 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for Server (Port 4225)
        run: |
          for _ in {1..60}; do
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "Server process exited before opening port 4225"
              cat /tmp/grctld.log
              exit 1
            fi
            if printf "" 2>/dev/null >/dev/tcp/127.0.0.1/4225; then
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start in 60s"
          cat /tmp/grctld.log
          exit 1

      - name: Run tests
        run: mise run test

      - name: Stop Server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
          fi

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: grctld-logs
          path: /tmp/grctld.log
          retention-days: 7
